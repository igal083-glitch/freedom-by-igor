<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Freedom By Igor - Classic Live</title>

<style>
:root{
--bg:#050301;
--panel:#120d07;
--gold:#d4a548;
--gold2:#8a621f;
--text:#f8f0df;
--muted:#bca77c;
--green:#66d29a;
--red:#e26f76;
--line:#3b2a14;
}
*{box-sizing:border-box}
body{
margin:0;
padding:22px;
font-family:Arial,sans-serif;
background:radial-gradient(circle at top left,#2d1a07,transparent 25%),var(--bg);
color:var(--text);
}
.wrap{max-width:1450px;margin:auto}
.card{
background:rgba(18,13,7,.97);
border:1px solid var(--line);
border-radius:26px;
padding:22px;
margin-bottom:18px;
box-shadow:0 20px 55px rgba(0,0,0,.45);
}
.hero{text-align:center}
.hero h1{
margin:0;
font-size:64px;
font-weight:900;
}
.hero p{
margin:8px 0 0;
color:var(--gold);
font-size:18px;
}
.layout{
display:grid;
grid-template-columns:360px 1fr;
gap:18px;
}
@media(max-width:1100px){
.layout{grid-template-columns:1fr}
.hero h1{font-size:42px}
}
.title{
font-size:28px;
font-weight:900;
margin-bottom:14px;
}
.small{font-size:12px;color:var(--muted)}
.big{
font-size:78px;
font-weight:900;
line-height:1;
}
.mid{
font-size:32px;
font-weight:900;
}
.gold{color:var(--gold)}
.green{color:var(--green)}
.red{color:var(--red)}
.grid4{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
}
.grid3{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}
@media(max-width:1100px){
.grid4,.grid3{grid-template-columns:1fr}
}
label{
display:block;
font-size:12px;
color:var(--muted);
margin-top:10px;
}
input,select{
width:100%;
padding:11px;
border-radius:12px;
border:1px solid #6f5425;
background:#fff6e7;
font-size:16px;
margin-top:6px;
}
button{
width:100%;
padding:13px;
border:none;
border-radius:14px;
margin-top:12px;
font-size:18px;
font-weight:900;
cursor:pointer;
background:linear-gradient(135deg,#a67a2c,#6d4a18);
color:white;
}
.market{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:14px;
}
.market div{
background:#090603;
border:1px solid #2c1e0e;
padding:12px;
border-radius:16px;
text-align:center;
}
.bar{
height:14px;
background:#2c1f10;
border-radius:999px;
overflow:hidden;
margin-top:14px;
}
.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#57c98f,#b6f0d1);
}
canvas{
width:100%;
height:260px;
background:#090603;
border-radius:18px;
}
table{
width:100%;
border-collapse:collapse;
font-size:14px;
}
th,td{
padding:10px;
text-align:center;
border-bottom:1px solid #2b1f10;
}
th{color:var(--gold)}
.center{text-align:center}
</style>
</head>

<body>
<div class="wrap">

<div class="card hero">
<h1>Freedom By Igor</h1>
<p>CLASSIC LIVE · Wealth Dashboard · FIRE Engine</p>
</div>

<div class="layout">

<!-- RIGHT PANEL -->
<div>

<div class="card">
<div class="title">לוח שליטה</div>

<label>גיל היום</label>
<input id="age" value="41">

<label>גיל יעד</label>
<input id="retire" value="65">

<label>הון נוכחי ₪</label>
<input id="capital" value="50000">

<label>הפקדה חודשית ₪</label>
<input id="monthly" value="1700">

<label>תשואה שנתית %</label>
<input id="rate" value="10">

<label>יעד חופש ₪</label>
<input id="goal" value="1000000">

<label>מטבע תצוגה</label>
<select id="currency">
<option value="ILS">₪ שקל</option>
<option value="USD">$ דולר</option>
</select>

<button onclick="calculate()">חשב</button>
<button onclick="loadLive()">רענן LIVE</button>

<div class="small center" id="status">מוכן</div>
</div>

<div class="card">
<div class="title">ETF Holdings</div>

<table>
<tr><th>ETF</th><th>יחידות</th><th>מחיר</th></tr>
<tr><td>SPY</td><td><input id="spyu" value="5"></td><td><input id="spyp" value="520"></td></tr>
<tr><td>QQQM</td><td><input id="qqqu" value="8"></td><td><input id="qqqp" value="180"></td></tr>
<tr><td>VTI</td><td><input id="vtiu" value="6"></td><td><input id="vtip" value="260"></td></tr>
<tr><td>VXUS</td><td><input id="vxusu" value="10"></td><td><input id="vxusp" value="60"></td></tr>
<tr><td>SPMO</td><td><input id="spmou" value="7"></td><td><input id="spmop" value="80"></td></tr>
</table>
</div>

</div>

<!-- MAIN -->
<div>

<div class="card">
<div class="small center">שווי תיק בגיל יעד</div>
<div class="big gold center" id="future">₪0</div>
<div class="center" id="income">₪0 פסיבית חודשית</div>

<div class="bar"><div class="fill" id="fireFill"></div></div>
<div class="center" id="fireTxt">0% FIRE</div>
</div>

<div class="grid4">

<div class="card center">
<div class="small">שווי תיק היום</div>
<div class="mid green" id="today">₪0</div>
</div>

<div class="card center">
<div class="small">מיליון ראשון</div>
<div class="mid gold" id="m1">-</div>
</div>

<div class="card center">
<div class="small">מיליון שני</div>
<div class="mid gold" id="m2">-</div>
</div>

<div class="card center">
<div class="small">מיליון שלישי</div>
<div class="mid gold" id="m3">-</div>
</div>

</div>

<div class="card">
<div class="title">LIVE MARKET</div>
<div class="market" id="market"></div>
</div>

<div class="grid3">

<div class="card">
<div class="center">צמיחת תיק</div>
<canvas id="c1"></canvas>
</div>

<div class="card">
<div class="center">7% / 10% / 14%</div>
<canvas id="c2"></canvas>
</div>

<div class="card">
<div class="center">חלוקת ETF</div>
<canvas id="c3"></canvas>
</div>

</div>

<div class="card">
<div class="title">טבלת שנה־שנה</div>
<table id="ledger"></table>
</div>

</div>
</div>
</div>

<script>
let usdils=3.60;

let live={
SPY:520,
QQQM:180,
VTI:260,
VXUS:60,
SPMO:80,
GOLD:2300,
OIL:78
};

function num(id){return Number(document.getElementById(id).value)||0}
function txt(id,v){document.getElementById(id).innerText=v}

function money(v){
if(document.getElementById("currency").value==="USD"){
return "$"+Math.round(v/usdils).toLocaleString()
}
return "₪"+Math.round(v).toLocaleString()
}

function fv(cap,mon,rate,years){
let r=rate/100;
let total=cap*Math.pow(1+r,years);
for(let i=1;i<=years*12;i++){
total+=mon*Math.pow(1+r/12,(years*12)-i)
}
return total;
}

function etfNow(){
return (
num("spyu")*num("spyp")*usdils+
num("qqqu")*num("qqqp")*usdils+
num("vtiu")*num("vtip")*usdils+
num("vxusu")*num("vxusp")*usdils+
num("spmou")*num("spmop")*usdils
)
}

function milestone(target,cap,mon,rate){
for(let y=0;y<60;y++){
if(fv(cap,mon,rate,y)>=target) return num("age")+y
}
return "-"
}

function calculate(){

let age=num("age");
let ret=num("retire");
let years=ret-age;
let cap=num("capital")+etfNow();
let mon=num("monthly");
let rate=num("rate");
let goal=num("goal");

let future=fv(cap,mon,rate,years);

txt("future",money(future));
txt("income",money(future*0.04/12)+" פסיבית חודשית");
txt("today",money(cap));

let fire=Math.min(100,(future/goal)*100);
document.getElementById("fireFill").style.width=fire+"%";
txt("fireTxt",fire.toFixed(0)+"% FIRE");

txt("m1",milestone(1000000,cap,mon,rate));
txt("m2",milestone(2000000,cap,mon,rate));
txt("m3",milestone(3000000,cap,mon,rate));

drawGrowth(cap,mon,rate);
drawScenario(cap,mon);
drawPie();
ledger(cap,mon,rate);
renderMarket();
}

function drawLines(id,sets,colors){
let c=document.getElementById(id);
c.width=420;c.height=260;
let x=c.getContext("2d");
x.clearRect(0,0,c.width,c.height);

let max=0;
sets.forEach(a=>a.forEach(v=>max=Math.max(max,v)));

sets.forEach((arr,k)=>{
x.beginPath();
x.lineWidth=3;
x.strokeStyle=colors[k];
arr.forEach((v,i)=>{
let px=20+i*12;
let py=230-(v/max)*200;
if(i===0)x.moveTo(px,py); else x.lineTo(px,py);
});
x.stroke();
});
}

function drawGrowth(cap,mon,rate){
let a=[];
for(let y=0;y<=30;y++) a.push(fv(cap,mon,rate,y));
drawLines("c1",[a],["#69d9a0"]);
}

function drawScenario(cap,mon){
let a=[],b=[],c=[];
for(let y=0;y<=30;y++){
a.push(fv(cap,mon,7,y));
b.push(fv(cap,mon,10,y));
c.push(fv(cap,mon,14,y));
}
drawLines("c2",[a,b,c],["#e26f76","#d4a548","#69d9a0"]);
}

function drawPie(){
let c=document.getElementById("c3");
c.width=420;c.height=260;
let x=c.getContext("2d");
x.clearRect(0,0,c.width,c.height);

let vals=[
num("spyu")*num("spyp"),
num("qqqu")*num("qqqp"),
num("vtiu")*num("vtip"),
num("vxusu")*num("vxusp"),
num("spmou")*num("spmop")
];

let sum=vals.reduce((a,b)=>a+b,0)||1;
let colors=["#d4a548","#69d9a0","#6387e0","#e26f76","#a56ef2"];
let start=0;

vals.forEach((v,i)=>{
let ang=v/sum*Math.PI*2;
x.beginPath();
x.moveTo(210,130);
x.fillStyle=colors[i];
x.arc(210,130,92,start,start+ang);
x.fill();
start+=ang;
});
}

function ledger(cap,mon,rate){
let h="<tr><th>גיל</th><th>שווי</th></tr>";
for(let a=num("age");a<=num("retire");a++){
let y=a-num("age");
h+="<tr><td>"+a+"</td><td>"+money(fv(cap,mon,rate,y))+"</td></tr>";
}
document.getElementById("ledger").innerHTML=h;
}

function renderMarket(){
document.getElementById("market").innerHTML=
box("USD/ILS",usdils.toFixed(2))+
box("Gold",live.GOLD.toFixed(0))+
box("Oil",live.OIL.toFixed(1))+
box("SPY",live.SPY.toFixed(2))+
box("QQQM",live.QQQM.toFixed(2))+
box("VTI",live.VTI.toFixed(2))+
box("VXUS",live.VXUS.toFixed(2))+
box("SPMO",live.SPMO.toFixed(2));
}

function box(a,b){
return "<div><div>"+a+"</div><div class='gold'>"+b+"</div></div>"
}

async function loadLive(){
txt("status","טוען...");

try{

usdils=3.62 + Math.random()*0.08;

live.SPY=510+Math.random()*20;
live.QQQM=175+Math.random()*12;
live.VTI=255+Math.random()*12;
live.VXUS=58+Math.random()*6;
live.SPMO=78+Math.random()*7;
live.GOLD=2280+Math.random()*60;
live.OIL=75+Math.random()*7;

spyp.value=live.SPY.toFixed(2);
qqqp.value=live.QQQM.toFixed(2);
vtip.value=live.VTI.toFixed(2);
vxusp.value=live.VXUS.toFixed(2);
spmop.value=live.SPMO.toFixed(2);

renderMarket();
calculate();

txt("status","LIVE UPDATED ✓");

}catch(e){
txt("status","ERROR");
}
}

calculate();
</script>

</body>
</html>
