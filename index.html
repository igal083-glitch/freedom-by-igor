<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freedom By Igor</title>
<style>
body{margin:0;font-family:Arial;background:#070604;color:#f6ead8}
.wrap{max-width:1250px;margin:auto;padding:28px}
.card{background:#151008;border:1px solid #8a651d;border-radius:28px;padding:28px;margin-bottom:22px}
.hero{text-align:center}
h1{font-size:72px;margin:0}
.gold{color:#d8a63a}
.grid{display:grid;grid-template-columns:360px 1fr;gap:22px}
input{width:100%;padding:14px;margin:8px 0;border-radius:14px;border:0;font-size:18px}
button{padding:14px 24px;border:0;border-radius:14px;background:#8a6418;color:white;font-size:18px;cursor:pointer}
.big{font-size:78px;font-weight:900}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.metric{text-align:center}
.metric b{font-size:34px}
.green{color:#71d69a}.red{color:#ff7e8a}
.barbox{height:16px;background:#3b2f1a;border-radius:99px;overflow:hidden}
.bar{height:100%;background:#71d69a;width:0}
.chart{height:180px;display:flex;align-items:end;gap:5px;border-bottom:1px solid #8a651d}
.col{flex:1;background:linear-gradient(#d8a63a,#805a16);border-radius:8px 8px 0 0}
@media(max-width:900px){.grid,.metrics{grid-template-columns:1fr}h1{font-size:42px}.big{font-size:44px}}
</style>
</head>
<body>
<div class="wrap">

<div class="card hero">
<div class="gold">♛ IGOR EDITION</div>
<h1>Freedom By Igor</h1>
<div class="gold">מפת הדרך האישית לחופש כלכלי</div>
</div>

<div class="grid">
<div class="card">
<h2>לוח שליטה</h2>
<input id="age" type="number" value="41" placeholder="גיל היום">
<input id="ret" type="number" value="65" placeholder="גיל יעד">
<input id="cap" type="number" value="50000" placeholder="הון קיים">
<input id="mon" type="number" value="1700" placeholder="הפקדה חודשית">
<input id="rate" type="number" value="10" placeholder="תשואה שנתית %">
<input id="target" type="number" value="1000000" placeholder="יעד כספי">
<button onclick="calc()">חשב</button>
</div>

<div>
<div class="card">
<div>התיק הצפוי בגיל <span id="retShow">65</span></div>
<div id="out" class="big">₪0</div>
<div id="passive"></div>
<br>
<div>Freedom Score: <b id="scoreText">0%</b></div>
<div class="barbox"><div id="scoreBar" class="bar"></div></div>
</div>

<div class="metrics">
<div class="card metric">הופקד בפועל<br><b id="invested" class="green"></b></div>
<div class="card metric">רווח מריבית דריבית<br><b id="gains" class="gold"></b></div>
<div class="card metric">מחיר הישיבה על מזומן<br><b id="cashCost" class="red"></b></div>
</div>

<div class="card">
<h2>גרף צמיחה שנתי</h2>
<div id="chart" class="chart"></div>
</div>
</div>
</div>
</div>

<script>
function money(n){return new Intl.NumberFormat('he-IL',{style:'currency',currency:'ILS',maximumFractionDigits:0}).format(n)}
function short(n){return n>=1000000?'₪'+(n/1000000).toFixed(2)+'M':money(n)}
function calc(){
let age=+document.getElementById('age').value;
let ret=+document.getElementById('ret').value;
let cap=+document.getElementById('cap').value;
let mon=+document.getElementById('mon').value;
let rate=+document.getElementById('rate').value/100;
let target=+document.getElementById('target').value;

let total=cap, invested=cap, cash=cap, rows=[];
for(let y=age;y<=ret;y++){
 for(let m=0;m<12;m++){
  total+=mon;
  total*=1+rate/12;
  invested+=mon;
  cash+=mon;
 }
 rows.push({age:y,total:total});
}

let gains=total-invested;
let cashCost=total-cash;
let score=Math.min(100,Math.round(total/target*100));

document.getElementById('retShow').innerText=ret;
document.getElementById('out').innerText=money(total);
document.getElementById('passive').innerText='הכנסה פסיבית משוערת: '+money(total*0.04/12)+' לחודש';
document.getElementById('invested').innerText=short(invested);
document.getElementById('gains').innerText=short(gains);
document.getElementById('cashCost').innerText=short(cashCost);
document.getElementById('scoreText').innerText=score+'%';
document.getElementById('scoreBar').style.width=score+'%';

let max=Math.max(...rows.map(r=>r.total));
document.getElementById('chart').innerHTML=rows.map(r=>'<div class="col" title="'+r.age+' '+money(r.total)+'" style="height:'+(r.total/max*170)+'px"></div>').join('');
}
document.querySelectorAll('input').forEach(i=>i.addEventListener('input',calc));
calc();
</script>

</body>
</html>
