<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freedom By Igor</title>
<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
padding:30px;
}
.wrap{
max-width:1100px;
margin:auto;
}
.card{
background:#120b02;
border:1px solid #7a5617;
border-radius:24px;
padding:25px;
margin-bottom:25px;
}
h1{
font-size:64px;
margin:0;
color:#fff;
}
.gold{
color:#d8a63a;
}
input{
width:100%;
padding:15px;
margin:10px 0;
font-size:22px;
border-radius:14px;
border:none;
}
button{
padding:15px 30px;
font-size:22px;
background:#8a6418;
color:#fff;
border:none;
border-radius:14px;
cursor:pointer;
}
.result{
font-size:70px;
font-weight:bold;
margin-top:15px;
}
.small{
font-size:28px;
color:#ddd;
}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
<h1>Freedom By Igor</h1>
<div class="gold">מפת הדרך האישית לחופש כלכלי</div>
</div>

<div class="card">
<input id="age" type="number" value="41" placeholder="גיל נוכחי">
<input id="ret" type="number" value="65" placeholder="גיל יעד">
<input id="cap" type="number" value="50000" placeholder="הון קיים">
<input id="mon" type="number" value="1700" placeholder="הפקדה חודשית">
<input id="rate" type="number" value="10" placeholder="תשואה שנתית %">
<button onclick="calc()">חשב</button>
</div>

<div class="card">
<div class="small">התיק הצפוי:</div>
<div class="result" id="out">₪ 0</div>
<div class="small" id="monthly"></div>
</div>

</div>

<script>
function calc(){
let age=+document.getElementById("age").value;
let ret=+document.getElementById("ret").value;
let cap=+document.getElementById("cap").value;
let mon=+document.getElementById("mon").value;
let rate=+document.getElementById("rate").value/100;

let years=ret-age;
let total=cap;

for(let i=0;i<years*12;i++){
total+=mon;
total*=1+rate/12;
}

document.getElementById("out").innerHTML="₪ "+Math.round(total).toLocaleString();
document.getElementById("monthly").innerHTML="הכנסה פסיבית משוערת: ₪ "+Math.round(total*0.04/12).toLocaleString()+" לחודש";
}
calc();
</script>

</body>
</html>
